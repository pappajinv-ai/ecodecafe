<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Income Data Entry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; min-height:100vh; margin:0; padding:18px; box-sizing:border-box; display:flex; align-items:center; justify-content:center; }
      .container { width:100%; max-width:720px; background:#fff; padding:18px; border-radius:12px; box-shadow:0 12px 30px rgba(0,0,0,0.06); border:1px solid #e7e9ef; }
      .form-group label { font-weight:600; color:#374151; margin-bottom:6px; display:block; }
      input[type="date"], input[type="number"], input[type="text"], input[type="password"] { width:100%; padding:12px; border:1px solid #d1d5db; border-radius:8px; font-size:1rem; box-sizing:border-box; }
      .btn { padding:12px 18px; border-radius:10px; font-weight:700; cursor:pointer; min-height:44px; display:inline-flex; align-items:center; justify-content:center; }
      .btn-primary { background:#4f46e5; color:#fff; box-shadow:0 6px 14px rgba(79,70,229,0.15); border:none; }
      .btn-secondary { background:#eef2ff; color:#1e3a8a; border:1px solid #c7d2fe; }
      .message-box { padding:12px; border-radius:8px; margin-top:12px; display:none; font-weight:700; text-align:center; }
      .message-box.success { background:#d1fae5; color:#065f46; border:1px solid #34d399; display:block; }
      .message-box.error { background:#fee2e2; color:#991b1b; border:1px solid #ef4444; display:block; }
      .loading-spinner { border:4px solid rgba(255,255,255,0.2); border-top:4px solid #fff; border-radius:50%; width:18px; height:18px; animation:spin 1s linear infinite; margin-left:8px; display:none; }
      .btn.loading .loading-spinner { display:inline-block; }
      @keyframes spin { 0%{transform:rotate(0deg)}100%{transform:rotate(360deg)} }
      .hidden { display:none !important; }
      .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
      /* small screens */
      @media (max-width:640px) {
        .container { padding:14px; }
        .btn { width:100%; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Login Form -->
      <div id="loginSection">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-4">Login</h2>
        <form id="loginForm" class="space-y-4">
          <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
          </div>
          <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-full">
            <span>Login</span>
            <div class="loading-spinner"></div>
          </button>
        </form>
      </div>

      <!-- Data Entry Form (Hidden by default) -->
      <div id="dataEntrySection" class="hidden">
        <h2 id="locationTitle" class="text-2xl font-bold text-gray-800 mb-4"></h2>
        <form id="dataEntryForm" class="space-y-4">
          <div class="form-group">
            <label for="date">Date:</label>
            <input type="date" id="date" name="date" required>
          </div>
          <div class="form-group">
            <label for="totalCollection">Total Collection:</label>
            <input type="number" id="totalCollection" name="totalCollection" step="0.01" min="0" required>
          </div>
          <div class="form-group">
            <label for="onlineCollection">Online Collection:</label>
            <input type="number" id="onlineCollection" name="onlineCollection" step="0.01" min="0" required>
          </div>
          <div class="form-group">
            <label for="remittanceToBank">Remittance to Bank:</label>
            <input type="number" id="remittanceToBank" name="remittanceToBank" step="0.01" min="0" required>
          </div>
          <button type="submit" class="btn btn-primary w-full mt-2">
            <span>Submit Data</span>
            <div class="loading-spinner"></div>
          </button>
        </form>
        <button id="logoutButton" class="btn btn-secondary w-full mt-4">Logout</button>

        <!-- My Report Section -->
        <div id="myReportSection" class="my-report-section hidden">
          <h3>My Data Report</h3>
          <div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;">
            <div style="flex:1;min-width:140px">
              <label for="myReportFromDate">From Date:</label>
              <input type="date" id="myReportFromDate" required>
            </div>
            <div style="flex:1;min-width:140px">
              <label for="myReportToDate">To Date:</label>
              <input type="date" id="myReportToDate" required>
            </div>
            <div style="align-self:flex-end">
              <button id="viewMyReportBtn" class="btn btn-secondary">
                <span>View Report</span>
                <div class="loading-spinner"></div>
              </button>
            </div>
          </div>
          <div id="myReportContainer" style="margin-top:12px;">
            <p class="no-data-message">Select a date range and click 'View Report'.</p>
          </div>
          <div id="myDayByDayContainer" class="mt-4"></div>
        </div>
      </div>

      <div id="messageBox" class="message-box hidden"></div>
    </div>

    <!-- Confirmation Modal HTML -->
    <div id="confirmationModal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.45);z-index:1000;">
      <div style="background:#fff;padding:18px;border-radius:12px;max-width:400px;width:90%;box-shadow:0 12px 30px rgba(0,0,0,0.12);text-align:center;">
        <h3 style="font-size:1.15rem;font-weight:700;margin-bottom:10px;">Confirm Submission</h3>
        <p style="margin-bottom:18px;color:#374151;">Are you sure you want to submit this data?</p>
        <div style="display:flex;gap:12px;">
          <button id="confirmSubmitBtn" class="btn btn-primary" style="flex:1">Confirm</button>
          <button id="cancelSubmitBtn" class="btn btn-secondary" style="flex:1">Cancel</button>
        </div>
      </div>
    </div>

    <script>
      // (JS kept mostly identical to original but adapted to responsive changes)
      // DOM Elements
      const loginSection = document.getElementById('loginSection');
      const dataEntrySection = document.getElementById('dataEntrySection');
      const loginForm = document.getElementById('loginForm');
      const dataEntryForm = document.getElementById('dataEntryForm');
      const logoutButton = document.getElementById('logoutButton');
      const locationTitle = document.getElementById('locationTitle');
      const messageBox = document.getElementById('messageBox');

      const confirmationModal = document.getElementById('confirmationModal');
      const confirmSubmitBtn = document.getElementById('confirmSubmitBtn');
      const cancelSubmitBtn = document.getElementById('cancelSubmitBtn');

      const myReportSection = document.getElementById('myReportSection');
      const myReportFromDateInput = document.getElementById('myReportFromDate');
      const myReportToDateInput = document.getElementById('myReportToDate');
      const viewMyReportBtn = document.getElementById('viewMyReportBtn');
      const myReportContainer = document.getElementById('myReportContainer');

      let currentUserLocation = null;

      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      const todayFormatted = `${yyyy}-${mm}-${dd}`;

      document.getElementById('date').value = todayFormatted;
      document.getElementById('date').setAttribute('max', todayFormatted);

      const firstDayOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
      const firstDayYyyy = firstDayOfMonth.getFullYear();
      const firstDayMm = String(firstDayOfMonth.getMonth() + 1).padStart(2, '0');
      const firstDayDd = String(firstDayOfMonth.getDate()).padStart(2, '0');

      myReportFromDateInput.value = `${firstDayYyyy}-${firstDayMm}-${firstDayDd}`;
      myReportToDateInput.value = todayFormatted;
      myReportFromDateInput.setAttribute('max', todayFormatted);
      myReportToDateInput.setAttribute('max', todayFormatted);

      function showLoginForm() {
        loginSection.classList.remove('hidden');
        dataEntrySection.classList.add('hidden');
        myReportSection.classList.add('hidden');
        hideMessage();
        loginForm.reset();
      }
      function showDataEntryForm() {
        loginSection.classList.add('hidden');
        dataEntrySection.classList.remove('hidden');
        myReportSection.classList.remove('hidden');
        hideMessage();
        dataEntryForm.reset();
        document.getElementById('date').value = todayFormatted;
        myReportContainer.innerHTML = '<p class="no-data-message">Select a date range and click \\'View Report\\'.</p>';
      }
      document.addEventListener('DOMContentLoaded', showLoginForm);

      loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const loginButton = loginForm.querySelector('button[type="submit"]');
        loginButton.classList.add('loading');
        loginButton.disabled = true;
        hideMessage();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
          const response = await google.script.run
            .withSuccessHandler((result) => {
              loginButton.classList.remove('loading');
              loginButton.disabled = false;

              if (result.success) {
                currentUserLocation = result.locationName;
                locationTitle.textContent = `${currentUserLocation} Income Entry`;
                showDataEntryForm();
                showMessage(result.message, "success");
              } else {
                showMessage(result.message || "Login failed. Please check credentials.", "error");
              }
            })
            .withFailureHandler((error) => {
              console.error("Apps Script login call failed:", error);
              showMessage("An unexpected error occurred during login. Please try again.", "error");
              loginButton.classList.remove('loading');
              loginButton.disabled = false;
            })
            .handleLogin(username, password);
        } catch (error) {
          console.error("Login process error:", error);
          showMessage("An unexpected error occurred. Please try again.", "error");
          loginButton.classList.remove('loading');
          loginButton.disabled = false;
        }
      });

      dataEntryForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const date = document.getElementById('date').value;
        const totalCollection = parseFloat(document.getElementById('totalCollection').value);
        const onlineCollection = parseFloat(document.getElementById('onlineCollection').value);

        const selectedDate = new Date(date);
        const todayEndOfDay = new Date();
        todayEndOfDay.setHours(23, 59, 59, 999);

        if (!date || isNaN(selectedDate.getTime())) {
          showMessage("Please enter a valid date.", "error");
          return;
        }
        if (selectedDate.getTime() > todayEndOfDay.getTime()) {
          showMessage("Date cannot be in the future.", "error");
          return;
        }
        if (isNaN(totalCollection) || totalCollection < 0) {
          showMessage("Total Collection must be a non-negative number.", "error");
          return;
        }
        if (isNaN(onlineCollection) || onlineCollection < 0) {
          showMessage("Online Collection must be a non-negative number.", "error");
          return;
        }
        if (onlineCollection > totalCollection) {
          showMessage("Online Collection cannot be greater than Total Collection.", "error");
          return;
        }

        confirmationModal.classList.remove('hidden');
      });

      confirmSubmitBtn.addEventListener('click', () => {
        confirmationModal.classList.add('hidden');
        submitActualData();
      });

      cancelSubmitBtn.addEventListener('click', () => {
        confirmationModal.classList.add('hidden');
        showMessage("Submission cancelled.", "info");
      });

      async function submitActualData() {
        const submitButton = dataEntryForm.querySelector('button[type="submit"]');
        submitButton.classList.add('loading');
        submitButton.disabled = true;
        hideMessage();

        const formData = {
          date: document.getElementById('date').value,
          totalCollection: parseFloat(document.getElementById('totalCollection').value),
          onlineCollection: parseFloat(document.getElementById('onlineCollection').value),
          remittanceToBank: parseFloat(document.getElementById('remittanceToBank').value),
          location: currentUserLocation
        };

        try {
          const response = await google.script.run
            .withSuccessHandler(onDataSubmitSuccess)
            .withFailureHandler(onDataSubmitFailure)
            .processFormData(formData);
        } catch (error) {
          console.error("Data submission call failed:", error);
          onDataSubmitFailure(error);
        }
      }

      function onDataSubmitSuccess(response) {
        const submitButton = dataEntryForm.querySelector('button[type="submit"]');
        submitButton.classList.remove('loading');
        submitButton.disabled = false;

        if (response.success) {
          showMessage(response.message, "success");
          document.getElementById('totalCollection').value = '';
          document.getElementById('onlineCollection').value = '';
          document.getElementById('remittanceToBank').value = '';
          document.getElementById('date').value = todayFormatted;
          viewMyReportBtn.click();
        } else {
          showMessage(response.message, "error");
        }
      }

      function onDataSubmitFailure(error) {
        const submitButton = dataEntryForm.querySelector('button[type="submit"]');
        submitButton.classList.remove('loading');
        submitButton.disabled = false;
        showMessage("An unexpected error occurred during data submission: " + (error && error.message ? error.message : error), "error");
      }

      logoutButton.addEventListener('click', () => {
        currentUserLocation = null;
        showMessage("Logged out successfully.", "success");
        showLoginForm();
      });

      viewMyReportBtn.addEventListener('click', viewMyReport);

      async function viewMyReport() {
        viewMyReportBtn.classList.add('loading');
        viewMyReportBtn.disabled = true;
        myReportContainer.innerHTML = '<p class="no-data-message">Loading your report...</p>';
        hideMessage();

        const fromDateStr = myReportFromDateInput.value;
        const toDateStr = myReportToDateInput.value;

        if (!fromDateStr || !toDateStr) {
          showMessage("Please select both 'From Date' and 'To Date' for your report.", "error");
          viewMyReportBtn.classList.remove('loading');
          viewMyReportBtn.disabled = false;
          return;
        }

        const fromDate = new Date(fromDateStr);
        const toDate = new Date(toDateStr);
        const todayEndOfDay = new Date();
        todayEndOfDay.setHours(23, 59, 59, 999);

        if (isNaN(fromDate.getTime()) || isNaN(toDate.getTime())) {
          showMessage("Invalid date format. Please use DD-MM-YYYY.", "error");
          viewMyReportBtn.classList.remove('loading');
          viewMyReportBtn.disabled = false;
          return;
        }
        if (fromDate.getTime() > toDate.getTime()) {
          showMessage("'From Date' cannot be after 'To Date'.", "error");
          viewMyReportBtn.classList.remove('loading');
          viewMyReportBtn.disabled = false;
          return;
        }
        if (fromDate.getTime() > todayEndOfDay.getTime() || toDate.getTime() > todayEndOfDay.getTime()) {
          showMessage("Report dates cannot be in the future.", "error");
          viewMyReportBtn.classList.remove('loading');
          viewMyReportBtn.disabled = false;
          return;
        }

        if (!currentUserLocation) {
          showMessage("Error: Not logged in. Cannot fetch report data.", "error");
          viewMyReportBtn.classList.remove('loading');
          viewMyReportBtn.disabled = false;
          showLoginForm();
          return;
        }

        try {
          const reportData = await google.script.run
            .withSuccessHandler(renderMyReport)
            .withFailureHandler(onViewMyReportFailure)
            .getMyAggregatedData(currentUserLocation, fromDateStr, toDateStr);
        } catch (error) {
          console.error("Error fetching my report data:", error);
          onViewMyReportFailure(error);
        }
      }

      function renderMyReport(reportData) {
        viewMyReportBtn.classList.remove('loading');
        viewMyReportBtn.disabled = false;

        if (!reportData) {
          myReportContainer.innerHTML = '<p class="no-data-message">No report data found for this period.</p>';
          document.getElementById('myDayByDayContainer').innerHTML = '';
          showMessage("No report data found for this period.", "info");
          return;
        }

        let tableHtml = `
          <div class="table-wrap">
            <table class="my-report-table" style="width:100%;border-collapse:collapse;">
              <thead>
                <tr><th style="text-align:left;padding:8px;background:#f3f4f6;">Metric</th><th style="padding:8px;background:#f3f4f6;">Amount</th></tr>
              </thead>
              <tbody>
                <tr><td style="padding:8px;">Total Collection</td><td style="padding:8px;">${formatNumber(reportData.totalCollection)}</td></tr>
                <tr><td style="padding:8px;">Total Online Collection</td><td style="padding:8px;">${formatNumber(reportData.totalOnlineCollection)}</td></tr>
                <tr><td style="padding:8px;">Total Cash Collection</td><td style="padding:8px;">${formatNumber(reportData.totalCashCollection)}</td></tr>
                <tr><td style="padding:8px;">Total Remittance to Bank</td><td style="padding:8px;">${formatNumber(reportData.totalRemittanceToBank)}</td></tr>
              </tbody>
            </table>
          </div>
        `;
        myReportContainer.innerHTML = tableHtml;

        const fromDateStr = myReportFromDateInput.value;
        const toDateStr = myReportToDateInput.value;
        google.script.run
          .withSuccessHandler(renderMyDayByDayTable)
          .withFailureHandler(() => {
            document.getElementById('myDayByDayContainer').innerHTML = "<p class='no-data-message'>Failed to load day-by-day data.</p>";
          })
          .getMyDayByDayData(currentUserLocation, fromDateStr, toDateStr);

        showMessage("Your report generated successfully!", "success");
      }

      function renderMyDayByDayTable(dayRows) {
        const container = document.getElementById('myDayByDayContainer');
        if (!dayRows || !dayRows.length) {
          container.innerHTML = "<p class='no-data-message'>No daily data available for this period.</p>";
          return;
        }
        let html = `
          <h4>Day by Day Details</h4>
          <div class="table-wrap">
            <table class="my-report-table" style="width:100%;border-collapse:collapse;">
              <thead>
                <tr><th style="text-align:left;padding:8px;background:#f3f4f6;">Date</th><th style="padding:8px;background:#f3f4f6;">Total</th><th style="padding:8px;background:#f3f4f6;">Online</th><th style="padding:8px;background:#f3f4f6;">Cash</th><th style="padding:8px;background:#f3f4f6;">Remittance</th></tr>
              </thead>
              <tbody>
                ${dayRows.map(row =>
                  `<tr>
                    <td style="padding:8px;">${row.date}</td>
                    <td style="padding:8px;">${formatNumber(row.totalCollection)}</td>
                    <td style="padding:8px;">${formatNumber(row.onlineCollection)}</td>
                    <td style="padding:8px;">${formatNumber(row.cashCollection)}</td>
                    <td style="padding:8px;">${formatNumber(row.remittanceToBank)}</td>
                  </tr>`
                ).join('')}
              </tbody>
            </table>
          </div>
        `;
        container.innerHTML = html;
      }

      function onViewMyReportFailure(error) {
        viewMyReportBtn.classList.remove('loading');
        viewMyReportBtn.disabled = false;
        myReportContainer.innerHTML = '<p class="no-data-message">Failed to load report data. Please try again.</p>';
        showMessage("Error loading your report: " + (error && error.message ? error.message : error), "error");
      }

      function showMessage(msg, type) {
        messageBox.textContent = msg;
        messageBox.className = `message-box ${type}`;
        messageBox.style.display = 'block';
      }
      function hideMessage() {
        messageBox.classList.add('hidden');
        messageBox.style.display = 'none';
      }
      function formatNumber(num) {
        if (typeof num !== 'number' || isNaN(num)) return 'N/A';
        return num.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
    </script>
  </body>
</html>

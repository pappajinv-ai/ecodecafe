<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Income Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; min-height:100vh; margin:0; padding:18px; box-sizing:border-box; }
      .container { width:100%; max-width:1100px; margin:0 auto; background:#fff; padding:20px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.06); border:1px solid #e6e9ef; }
      .form-group label { font-weight:600; color:#374151; margin-bottom:6px; display:block; }
      input[type="date"], input[type="text"], input[type="password"] { width:100%; padding:12px; border:1px solid #d1d5db; border-radius:8px; font-size:1rem; box-sizing:border-box; }
      .btn { padding:12px 18px; border-radius:10px; font-weight:700; cursor:pointer; min-height:44px; display:inline-flex; align-items:center; justify-content:center; }
      .btn-primary { background:#4f46e5; color:#fff; border:none; }
      .btn-secondary { background:#eef2ff; color:#1e3a8a; border:1px solid #c7d2fe; }
      .tabs { display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
      .tab-button { padding:8px 12px; background:#fafafa; border:1px solid #e6e6e6; border-bottom:none; border-radius:8px 8px 0 0; font-weight:600; color:#374151; white-space:nowrap; }
      .tab-button.active { background:#4f46e5; color:#fff; border-color:#4f46e5; }
      .tab-content { border:1px solid #e6e6e6; border-top:none; padding:12px; border-radius:0 0 8px 8px; background:#fff; }
      .report-table { width:100%; border-collapse:collapse; margin-top:10px; }
      .report-table th, .report-table td { border:1px solid #e5e7eb; padding:10px; text-align:left; font-size:14px; }
      .report-table th { background:#f3f4f6; font-weight:700; }
      .message-box { padding:12px; border-radius:8px; margin-top:12px; display:none; text-align:center; }
      .message-box.success { background:#d1fae5; color:#065f46; border:1px solid #34d399; display:block; }
      .message-box.error { background:#fee2e2; color:#991b1b; border:1px solid #ef4444; display:block; }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="adminLoginSection">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-4">Admin Report Login</h2>
        <form id="adminLoginForm" class="space-y-4">
          <div class="form-group">
            <label for="adminUsername">Username:</label>
            <input type="text" id="adminUsername" required>
          </div>
          <div class="form-group">
            <label for="adminPassword">Password:</label>
            <input type="password" id="adminPassword" required>
          </div>
          <button type="submit" id="adminLoginButton" class="btn btn-primary w-full">
            <span>Login</span>
            <div class="loading-spinner"></div>
          </button>
        </form>
      </div>

      <div id="reportSection" class="hidden">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Consolidated Income Report</h2>
        <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px;">
          <div style="flex:1;min-width:0">
            <label for="fromDate">From Date:</label>
            <input type="date" id="fromDate" required>
          </div>
          <div style="flex:1;min-width:0">
            <label for="toDate">To Date:</label>
            <input type="date" id="toDate" required>
          </div>
          <div style="align-self:flex-end">
            <button id="generateReportBtn" class="btn btn-primary">Generate Report</button>
          </div>
        </div>

        <div id="overallSummary" class="hidden" style="margin-bottom:12px;padding:10px;border-radius:8px;background:#f8fafc;border:1px solid #e6f0ff;">
          <div style="display:flex;justify-content:space-between;padding:6px 0;"><b>Total Collection Across All Locations:</b><span id="overallTotalCollection"></span></div>
          <div style="display:flex;justify-content:space-between;padding:6px 0;"><b>Total Online Collection:</b><span id="overallTotalOnlineCollection"></span></div>
          <div style="display:flex;justify-content:space-between;padding:6px 0;"><b>Total Cash Collection:</b><span id="overallTotalCashCollection"></span></div>
          <div style="display:flex;justify-content:space-between;padding:6px 0;"><b>Total Remittance to Bank:</b><span id="overallTotalRemittanceToBank"></span></div>
        </div>

        <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
          <button id="downloadReportBtn" class="btn btn-secondary hidden">Download Report (CSV)</button>
        </div>

        <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
          <button id="downloadAdminPdfBtn" class="btn btn-secondary">Download PDF Report</button>
        </div>

        <div class="tabs" id="reportTabs"></div>
        <div id="tabContentContainer"></div>

        <button id="adminLogoutButton" class="btn btn-secondary w-full mt-6">Logout</button>
      </div>

      <div id="messageBox" class="message-box hidden"></div>
    </div>

    <script>
      // Admin client-side JS (uses google.script.run callbacks)
      const adminLoginSection = document.getElementById('adminLoginSection');
      const reportSection = document.getElementById('reportSection');
      const adminLoginForm = document.getElementById('adminLoginForm');
      const fromDateInput = document.getElementById('fromDate');
      const toDateInput = document.getElementById('toDate');
      const generateReportBtn = document.getElementById('generateReportBtn');
      const reportTabsContainer = document.getElementById('reportTabs');
      const tabContentContainer = document.getElementById('tabContentContainer');
      const adminLogoutButton = document.getElementById('adminLogoutButton');
      const messageBox = document.getElementById('messageBox');
      const overallSummaryDiv = document.getElementById('overallSummary');
      const overallTotalCollectionSpan = document.getElementById('overallTotalCollection');
      const overallTotalOnlineCollectionSpan = document.getElementById('overallTotalOnlineCollection');
      const overallTotalCashCollectionSpan = document.getElementById('overallTotalCashCollection');
      const overallTotalRemittanceToBankSpan = document.getElementById('overallTotalRemittanceToBank');
      const downloadReportBtn = document.getElementById('downloadReportBtn');

      const today = new Date();
      const firstDayOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      const firstDayYyyy = firstDayOfMonth.getFullYear();
      const firstDayMm = String(firstDayOfMonth.getMonth() + 1).padStart(2, '0');
      const firstDayDd = String(firstDayOfMonth.getDate()).padStart(2, '0');
      if (fromDateInput) fromDateInput.value = `${firstDayYyyy}-${firstDayMm}-${firstDayDd}`;
      if (toDateInput) toDateInput.value = `${yyyy}-${mm}-${dd}`;
      if (fromDateInput) fromDateInput.setAttribute('max', `${yyyy}-${mm}-${dd}`);
      if (toDateInput) toDateInput.setAttribute('max', `${yyyy}-${mm}-${dd}`);

      document.addEventListener('DOMContentLoaded', () => {
        adminLoginSection.classList.remove('hidden');
        reportSection.classList.add('hidden');
      });

      adminLoginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const loginButton = document.getElementById('adminLoginButton');
        loginButton.classList.add('loading');
        loginButton.disabled = true;
        hideMessage();

        const username = document.getElementById('adminUsername').value;
        const password = document.getElementById('adminPassword').value;

        google.script.run
          .withSuccessHandler(function(result) {
            loginButton.classList.remove('loading');
            loginButton.disabled = false;
            if (result.success) {
              showReportSection();
              showMessage(result.message, "success");
              generateReport();
            } else {
              showMessage(result.message || "Login failed. Please check credentials.", "error");
            }
          })
          .withFailureHandler(function(error) {
            loginButton.classList.remove('loading');
            loginButton.disabled = false;
            showMessage("An unexpected error occurred during admin login. Please try again.", "error");
          })
          .handleAdminLogin(username, password);
      });

      function showReportSection() {
        adminLoginSection.classList.add('hidden');
        reportSection.classList.remove('hidden');
      }

      function generateReport() {
        hideMessage();
        overallSummaryDiv.classList.add('hidden');
        downloadReportBtn.classList.add('hidden');

        const fromDateStr = fromDateInput.value;
        const toDateStr = toDateInput.value;
        if (!fromDateStr || !toDateStr) { showMessage("Please select both dates.", "error"); return; }

        generateReportBtn.classList.add('loading');
        generateReportBtn.disabled = true;

        google.script.run
          .withSuccessHandler(renderReport)
          .withFailureHandler(onReportFailure)
          .getAggregatedReportData(fromDateStr, toDateStr);
      }

      function renderReport(reportData) {
        generateReportBtn.classList.remove('loading');
        generateReportBtn.disabled = false;

        if (!reportData || reportData.length === 0) { showMessage("No report data found for the selected date range.", "info"); reportTabsContainer.innerHTML=''; tabContentContainer.innerHTML=''; return; }

        let overallTotalCollection = 0, overallTotalOnlineCollection = 0, overallTotalCashCollection = 0, overallTotalRemittanceToBank = 0;

        reportData.forEach(ld => {
          overallTotalCollection += ld.totalCollection;
          overallTotalOnlineCollection += ld.totalOnlineCollection;
          overallTotalCashCollection += ld.totalCashCollection;
          overallTotalRemittanceToBank += ld.totalRemittanceToBank;
        });

        overallTotalCollectionSpan.textContent = formatNumber(overallTotalCollection);
        overallTotalOnlineCollectionSpan.textContent = formatNumber(overallTotalOnlineCollection);
        overallTotalCashCollectionSpan.textContent = formatNumber(overallTotalCashCollection);
        overallTotalRemittanceToBankSpan.textContent = formatNumber(overallTotalRemittanceToBank);
        overallSummaryDiv.classList.remove('hidden');
        downloadReportBtn.classList.remove('hidden');

        reportTabsContainer.innerHTML = '';
        tabContentContainer.innerHTML = '';

        let firstTabId = '';

        reportData.forEach((locationData, index) => {
          const locationId = locationData.locationName.replace(/[^a-zA-Z0-9]/g, '');
          const tabButton = document.createElement('button');
          tabButton.className = 'tab-button';
          tabButton.textContent = locationData.locationName;
          tabButton.setAttribute('data-target', locationId);
          tabButton.addEventListener('click', () => switchTab(locationId));
          reportTabsContainer.appendChild(tabButton);

          const tabContent = document.createElement('div');
          tabContent.id = `tabContent_${locationId}`;
          tabContent.className = 'tab-content hidden';
          tabContentContainer.appendChild(tabContent);

          renderTable(locationData, tabContent);

          if (index === 0) firstTabId = locationId;
        });

        if (firstTabId) switchTab(firstTabId);
        showMessage("Report generated successfully!", "success");
        if (window.sendHeightToParent) window.sendHeightToParent();
      }

      function renderTable(data, containerElement) {
        if (!data) { containerElement.innerHTML = '<p>No data for this location.</p>'; return; }
        const tableWrap = document.createElement('div');
        tableWrap.className = 'table-wrap';
        const table = document.createElement('table');
        table.className = 'report-table';
        table.innerHTML = `<thead><tr><th>Metric</th><th>Amount</th></tr></thead><tbody>
          <tr><td>Total Collection</td><td>${formatNumber(data.totalCollection)}</td></tr>
          <tr><td>Total Online Collection</td><td>${formatNumber(data.totalOnlineCollection)}</td></tr>
          <tr><td>Total Cash Collection</td><td>${formatNumber(data.totalCashCollection)}</td></tr>
          <tr><td>Total Remittance to Bank</td><td>${formatNumber(data.totalRemittanceToBank)}</td></tr>
        </tbody>`;
        tableWrap.appendChild(table);
        containerElement.appendChild(tableWrap);
      }

      function switchTab(targetId) {
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
        const btn = document.querySelector(`.tab-button[data-target="${targetId}"]`);
        if (btn) btn.classList.add('active');
        const content = document.getElementById(`tabContent_${targetId}`);
        if (content) content.classList.remove('hidden');
        if (window.sendHeightToParent) window.sendHeightToParent();
      }

      function onReportFailure(err) {
        generateReportBtn.classList.remove('loading');
        generateReportBtn.disabled = false;
        showMessage("Error generating report: " + (err && err.message ? err.message : err), "error");
      }

      adminLogoutButton.addEventListener('click', () => {
        adminLoginSection.classList.remove('hidden');
        reportSection.classList.add('hidden');
        reportTabsContainer.innerHTML = '';
        tabContentContainer.innerHTML = '';
        overallSummaryDiv.classList.add('hidden');
        downloadReportBtn.classList.add('hidden');
        showMessage("Logged out successfully.", "success");
        if (window.sendHeightToParent) window.sendHeightToParent();
      });

      downloadReportBtn.addEventListener('click', function() {
        downloadReportBtn.classList.add('loading');
        downloadReportBtn.disabled = true;
        const fromDateStr = fromDateInput.value;
        const toDateStr = toDateInput.value;
        google.script.run
          .withSuccessHandler(function(csv) {
            downloadReportBtn.classList.remove('loading');
            downloadReportBtn.disabled = false;
            if (csv) {
              const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `Income_Report_${fromDateStr}_to_${toDateStr}.csv`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
              showMessage("Report downloaded successfully!", "success");
            } else showMessage("No data to download.", "error");
          })
          .withFailureHandler(function(err) {
            downloadReportBtn.classList.remove('loading');
            downloadReportBtn.disabled = false;
            showMessage("CSV download failed: " + (err && err.message ? err.message : err), "error");
          })
          .getReportCsvData(fromDateStr, toDateStr);
      });

      document.getElementById('downloadAdminPdfBtn').addEventListener('click', function() {
        const fromDateStr = document.getElementById('fromDate').value;
        const toDateStr = document.getElementById('toDate').value;
        showMessage("Generating PDF...", "info");
        google.script.run
          .withSuccessHandler(function(base64) {
            const byteCharacters = atob(base64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
            const byteArray = new Uint8Array(byteNumbers);
            const blob = new Blob([byteArray], {type: 'application/pdf'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            a.download = `Income_Admin_Report_${fromDateStr}_to_${toDateStr}.pdf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showMessage("PDF generated and downloaded!", "success");
          })
          .withFailureHandler(function(err) {
            showMessage("PDF generation failed: " + (err && err.message ? err.message : err), "error");
          })
          .generateAdminPdfReportBase64(fromDateStr, toDateStr);
      });

      function showMessage(msg, type) {
        messageBox.textContent = msg;
        messageBox.className = 'message-box ' + (type || '');
        messageBox.style.display = 'block';
      }
      function hideMessage() { messageBox.classList.add('hidden'); messageBox.style.display = 'none'; }
      function formatNumber(num) { if (typeof num !== 'number' || isNaN(num)) return 'N/A'; return num.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

      // postMessage height sync
      (function() {
        function sendHeightToParent() {
          try {
            const height = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight, document.documentElement.offsetHeight);
            parent.postMessage({ type: 'setHeight', height: height }, '*');
          } catch (e) {}
        }
        window.addEventListener('load', function() { sendHeightToParent(); setTimeout(sendHeightToParent, 200); });
        window.addEventListener('resize', sendHeightToParent);
        window.addEventListener('message', function(e) { if (e.data && e.data.type === 'requestHeight') sendHeightToParent(); }, false);
        try { const mo = new MutationObserver(sendHeightToParent); mo.observe(document.body, { childList: true, subtree: true, attributes: true, characterData: true }); } catch (err) {}
        window.sendHeightToParent = sendHeightToParent;
      })();
    </script>
  </body>
</html>

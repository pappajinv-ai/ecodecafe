<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NETEDC-CAFETERIA Income Report</title>
  <style>
    body { font-family: Arial, sans-serif; margin:20px; color:#111827; }
    .container { width:100%; max-width:900px; margin:0 auto; }
    h1, h2 { margin: 0.5em 0 0.2em 0; font-weight:700; }
    .center { text-align:center; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 1em; table-layout:auto; }
    th, td { border: 1px solid #999; padding: 6px 8px; text-align: right; font-size: 12px; vertical-align:top; }
    th { background: #f3f4f6; font-weight:700; }
    .section { margin-bottom: 1.2em; }
    .footer { font-size: small; text-align: center; margin-top: 2em; color: #666; }
    .summary-table td, .summary-table th { text-align:right; }
    .summary-table td:first-child, .shop-col { text-align:left; }
    /* allow long tables to be scrolled in smaller viewports (useful if viewed on mobile before PDF) */
    .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="center">NETEDC-CAFETERIA Income Report</h1>
    <p class="center"><?= fromDate ?> to <?= toDate ?></p>
    <p class="center">Generated: <?= generatedOn ?></p>

    <div class="section">
      <h2>Summary</h2>
      <div class="table-wrap">
        <table class="summary-table">
          <tr>
            <th>Total Collection</th>
            <th>Online</th>
            <th>Cash</th>
            <th>Remittance</th>
          </tr>
          <tr>
            <td><?= total.toFixed(2) ?></td>
            <td><?= online.toFixed(2) ?></td>
            <td><?= cash.toFixed(2) ?></td>
            <td><?= remit.toFixed(2) ?></td>
          </tr>
        </table>
      </div>
    </div>

    <div class="section">
      <h2>Day-wise Details</h2>
      <div class="table-wrap">
        <table>
          <tr>
            <th style="text-align:left">Date</th>
            <th>Total</th>
            <th>Online</th>
            <th>Cash</th>
            <th>Remittance</th>
          </tr>
          <? for (var i=0; i<rows.length; i++) { ?>
            <tr>
              <td style="text-align:left"><?= rows[i].date ?></td>
              <td><?= rows[i].total.toFixed(2) ?></td>
              <td><?= rows[i].online.toFixed(2) ?></td>
              <td><?= rows[i].cash.toFixed(2) ?></td>
              <td><?= rows[i].remit.toFixed(2) ?></td>
            </tr>
          <? } ?>
        </table>
      </div>
    </div>

    <div class="footer">Generated by <?= generatedBy ?> on <?= generatedOn ?></div>
  </div>
</body>
</html>

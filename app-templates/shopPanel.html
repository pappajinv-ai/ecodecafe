<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shop Panel</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:12px} .shop-list{display:flex;flex-wrap:wrap;gap:8px}</style>
</head>
<body>
  <h3>Shop Panel</h3>
  <div class="shop-list">
    <p>Use the admin panel or data entry to view shop reports.</p>
  </div>

  <script>
    (function() {
      function sendHeightToParent() {
        try {
          const height = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight, document.documentElement.offsetHeight);
          parent.postMessage({ type: 'setHeight', height: height }, '*');
        } catch (e) {}
      }
      window.addEventListener('load', sendHeightToParent);
      window.addEventListener('resize', sendHeightToParent);
      window.addEventListener('message', function(e) { if (e.data && e.data.type === 'requestHeight') sendHeightToParent(); }, false);
    })();
  </script>
</body>
</html>

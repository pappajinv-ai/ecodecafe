<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Income Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; min-height:100vh; margin:0; padding:18px; box-sizing:border-box; }
      .container { width:100%; max-width:1100px; margin: 0 auto; background-color: #fff; padding:20px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border:1px solid #e6e9ef; }
      .form-group label { font-weight:600; color:#374151; margin-bottom:6px; display:block; }
      input[type="date"], input[type="text"], input[type="password"] { width:100%; padding:12px; border:1px solid #d1d5db; border-radius:8px; font-size:1rem; box-sizing:border-box; }
      .btn { padding:12px 18px; border-radius:10px; font-weight:700; cursor:pointer; transition:transform .15s ease; min-height:44px; display:inline-flex; align-items:center; justify-content:center; }
      .btn-primary { background:#4f46e5; color:#fff; border:none; box-shadow:0 6px 14px rgba(79,70,229,0.18); }
      .btn-secondary { background:#eef2ff; color:#1e3a8a; border:1px solid #c7d2fe; }
      .tabs { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
      .tab-button { padding:8px 12px; background:#fafafa; border:1px solid #e6e6e6; border-bottom:none; border-radius:8px 8px 0 0; font-weight:600; color:#374151; white-space:nowrap; }
      .tab-button.active { background:#4f46e5; color:#fff; border-color:#4f46e5; }
      .tab-content { border:1px solid #e6e6e6; border-top:none; padding:12px; border-radius:0 0 8px 8px; background:#fff; }
      .report-table { width:100%; border-collapse:collapse; margin-top:10px; }
      .report-table th, .report-table td { border:1px solid #e5e7eb; padding:10px; text-align:left; font-size:14px; }
      .report-table th { background:#f3f4f6; font-weight:700; }
      .overall-summary { background:#f8fafc; border:1px solid #e6f0ff; border-radius:8px; padding:12px; margin-bottom:14px; }
      .message-box { padding:12px; border-radius:8px; margin-top:12px; display:none; font-weight:700; text-align:center; }
      .message-box.success { background:#d1fae5; color:#065f46; border:1px solid #34d399; display:block; }
      .message-box.error { background:#fee2e2; color:#991b1b; border:1px solid #ef4444; display:block; }
      .loading-spinner { border:4px solid rgba(255,255,255,0.2); border-top:4px solid #fff; border-radius:50%; width:18px; height:18px; animation:spin 1s linear infinite; margin-left:8px; display:none; }
      .btn.loading .loading-spinner { display:inline-block; }
      @keyframes spin { 0%{transform:rotate(0deg)}100%{transform:rotate(360deg)} }
      @media (max-width:640px) { .container { padding:16px; } .form-group { margin-bottom:12px; } .flex-row { flex-direction:column; gap:10px; } .btn { width:100%; } .tabs { gap:4px; } }
      .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Admin Login Form -->
      <div id="adminLoginSection">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-4">Admin Report Login</h2>
        <form id="adminLoginForm" class="space-y-4">
          <div class="form-group">
            <label for="adminUsername">Username:</label>
            <input type="text" id="adminUsername" name="adminUsername" required>
          </div>
          <div class="form-group">
            <label for="adminPassword">Password:</label>
            <input type="password" id="adminPassword" name="adminPassword" required>
          </div>
          <button type="submit" id="adminLoginButton" class="btn btn-primary w-full">
            <span>Login</span>
            <div class="loading-spinner"></div>
          </button>
        </form>
      </div>

      <!-- Admin Report Section (Hidden by default) -->
      <div id="reportSection" class="hidden">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">Consolidated Income Report</h2>
        
        <div class="flex flex-row sm:flex-row gap-4 mb-4" style="display:flex;flex-wrap:wrap;">
          <div class="form-group" style="flex:1;min-width:0">
            <label for="fromDate">From Date:</label>
            <input type="date" id="fromDate" class="w-full" required>
          </div>
          <div class="form-group" style="flex:1;min-width:0">
            <label for="toDate">To Date:</label>
            <input type="date" id="toDate" class="w-full" required>
          </div>
          <div style="align-self:flex-end">
            <button id="generateReportBtn" class="btn btn-primary">
              <span>Generate Report</span>
              <div class="loading-spinner"></div>
            </button>
          </div>
        </div>

        <!-- Overall Summary Section -->
        <div id="overallSummary" class="overall-summary hidden">
          <h3>Overall Summary for Selected Period</h3>
          <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #e6eefc;

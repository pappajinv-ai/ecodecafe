<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shop Income Report PDF</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:12px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ccc;padding:6px}</style>
</head>
<body>
  <h1>Shop Income Report</h1>
  <div>Period: <?= fromDate ?> to <?= toDate ?></div>
  <div>Generated: <?= generatedOn ?> by <?= generatedBy ?></div>

  <h2 style="margin-top:12px">Totals</h2>
  <table>
    <tr><th>Total Collection</th><td><?= total.toFixed(2) ?></td></tr>
    <tr><th>Online Collection</th><td><?= online.toFixed(2) ?></td></tr>
    <tr><th>Cash Collection</th><td><?= cash.toFixed(2) ?></td></tr>
    <tr><th>Remittance</th><td><?= remit.toFixed(2) ?></td></tr>
  </table>

  <h2 style="margin-top:12px">Day by Day</h2>
  <table>
    <thead><tr><th>Date</th><th>Total</th><th>Online</th><th>Cash</th><th>Remit</th></tr></thead>
    <tbody>
      <? for (var i=0; i < rows.length; i++) { ?>
        <tr>
          <td><?= rows[i].date ?></td>
          <td><?= (rows[i].total || 0).toFixed(2) ?></td>
          <td><?= (rows[i].online || 0).toFixed(2) ?></td>
          <td><?= (rows[i].cash || 0).toFixed(2) ?></td>
          <td><?= (rows[i].remit || 0).toFixed(2) ?></td>
        </tr>
      <? } ?>
    </tbody>
  </table>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Income Report</title>
  <style>
    body { font-family: Arial, sans-serif; margin:20px; color:#111827; }
    .container { width:100%; max-width:1000px; margin:0 auto; }
    h1, h2, h3 { margin: 0.5em 0 0.2em 0; font-weight:700; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 1em; table-layout:auto; }
    th, td { border: 1px solid #999; padding: 6px 8px; text-align: right; font-size: 12px; }
    th { background: #f3f4f6; }
    .section { margin-bottom: 1.5em; }
    .center { text-align: center; }
    .footer { font-size: small; text-align: center; margin-top: 2em; color: #888; }
    .shop-header { background: #dbeafe; font-weight: bold; text-align:left; padding:6px 8px; }
    .table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
    td.first-col, th.first-col { text-align:left; }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="center">CAFETERIA-ECOSHOP INCOME<br/><?= fromDate ?> to <?= toDate ?></h1>
    <p class="center">Generated: <?= generatedOn ?></p>

    <div class="section">
      <h2>Abstract</h2>
      <div class="table-wrap">
        <table class="abstract-table">
          <tr><th class="first-col">Shop</th><th>Total Collection</th><th>Online</th><th>Cash</th><th>Remittance</th></tr>
          <? for (var i=0; i<abstract.length; i++) { ?>
            <tr>
              <td class="first-col"><?= abstract[i].shop ?></td>
              <td><?= abstract[i].total.toFixed(2) ?></td>
              <td><?= abstract[i].online.toFixed(2) ?></td>
              <td><?= abstract[i].cash.toFixed(2) ?></td>
              <td><?= abstract[i].remit.toFixed(2) ?></td>
            </tr>
          <? } ?>
          <tr style="font-weight:bold; background: #f0f9ff">
            <td class="first-col">Total</td>
            <td><?= total.total.toFixed(2) ?></td>
            <td><?= total.online.toFixed(2) ?></td>
            <td><?= total.cash.toFixed(2) ?></td>
            <td><?= total.remit.toFixed(2) ?></td>
          </tr>
        </table>
      </div>
    </div>

    <div class="section">
      <h2>Day by Day Total (All Shops)</h2>
      <div class="table-wrap">
        <table>
          <tr><th class="first-col">Date</th><th>Total Collection</th><th>Online</th><th>Cash</th><th>Remittance</th></tr>
          <? for (var i=0; i<totalByDate.length; i++) { ?>
            <tr>
              <td class="first-col"><?= totalByDate[i].date ?></td>
              <td><?= totalByDate[i].total.toFixed(2) ?></td>
              <td><?= totalByDate[i].online.toFixed(2) ?></td>
              <td><?= totalByDate[i].cash.toFixed(2) ?></td>
              <td><?= totalByDate[i].remit.toFixed(2) ?></td>
            </tr>
          <? } ?>
        </table>
      </div>
    </div>

    <? for (var shop in shopDayMap) { ?>
      <div class="section">
        <h3 class="shop-header"><?= shop ?></h3>
        <div class="table-wrap">
          <table>
            <tr><th class="first-col">Date</th><th>Total</th><th>Online</th><th>Cash</th><th>Remittance</th></tr>
            <? for (var i=0; i<shopDayMap[shop].length; i++) { ?>
              <tr>
                <td class="first-col"><?= shopDayMap[shop][i].date ?></td>
                <td><?= shopDayMap[shop][i].total.toFixed(2) ?></td>
                <td><?= shopDayMap[shop][i].online.toFixed(2) ?></td>
                <td><?= shopDayMap[shop][i].cash.toFixed(2) ?></td>
                <td><?= shopDayMap[shop][i].remit.toFixed(2) ?></td>
              </tr>
            <? } ?>
          </table>
        </div>
      </div>
    <? } ?>

    <div class="footer">Generated by <?= generatedBy ?> on <?= generatedOn ?></div>
  </div>
</body>
</html>

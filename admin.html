<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>EcoDecafe Admin (Embedded)</title>
    <style>
      html,body{height:100%;margin:0}
      #appFrame{width:100%;border:0;display:block;min-height:200px;}
    </style>
  </head>
  <body>
    <!-- Paste your Apps Script exec URL plus ?app=admin into the src below after you deploy the script -->
    <iframe id="appFrame"
            src="https://script.google.com/macros/s/AKfycbxXhc_9YAW8TRcrCUBTbU63SGiYpra4B2e4XLZj_VYbRDnjIXFeB1RV3VMelDdc5-G2TQ/exec?app=admin"
            title="EcoDecafe Admin"></iframe>

    <script>
      const iframe = document.getElementById('appFrame');
      window.addEventListener('message', function(e) {
        if (!e.data || typeof e.data !== 'object') return;
        if (e.data.type === 'setHeight' && e.data.height) {
          iframe.style.height = e.data.height + 'px';
        }
      }, false);

      setInterval(() => {
        try { iframe.contentWindow && iframe.contentWindow.postMessage({ type: 'requestHeight' }, '*'); } catch (e) {}
      }, 1000);

      iframe.style.height = (window.innerHeight || 800) + 'px';
    </script>
  </body>
</html>

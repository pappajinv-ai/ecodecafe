<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NETEDC-CAFETERIA | Shop Report Panel</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1e40af;
      --bg: #f6f9fc;
      --card: #fff;
    }
    html,body { height:100%; }
    body { font-family: Inter, Arial, sans-serif; margin: 12px; background: var(--bg); -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
    .container { width:100%; max-width: 640px; margin: 18px auto; background: var(--card); padding: 18px; border-radius: 12px; box-shadow: 0 0 18px rgba(0,0,0,0.04); box-sizing:border-box; }
    h1 { text-align: center; margin-bottom: 12px; font-size: 1.15rem; line-height:1.2; }
    label { display:block; margin-bottom:6px; font-size:0.95rem; color:#374151; }
    .row { display:flex; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
    .row > * { flex: 1 1 140px; min-width:0; }
    input[type="date"] { width:100%; padding:10px 12px; border:1px solid #d1d5db; border-radius:8px; font-size:1rem; box-sizing:border-box; background:#fff; }
    .actions { display:flex; gap:12px; justify-content:flex-end; flex-wrap:wrap; }
    .btn { padding:12px 14px; border: none; border-radius:10px; background: var(--primary); color:#fff; cursor:pointer; font-size:1rem; min-height:44px; display:inline-flex; align-items:center; justify-content:center; }
    .btn.secondary { background:#e5e7eb; color:#111827; }
    .btn:active { background: var(--primary-dark); transform: translateY(0); }
    .msg { margin: 10px 0 16px; padding: 10px; border-radius:8px; font-weight:600; }
    .msg.info { background: #eef2ff; color: #3730a3; }
    .msg.success { background: #dcfce7; color: #166534; }
    .msg.error { background: #fee2e2; color: #991b1b; }
    /* small screens */
    @media (max-width:420px) {
      .container { padding:16px; }
      h1 { font-size:1rem; }
      .row { gap:8px; }
      .btn { width:100%; }
      .actions { width:100%; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>NETEDC-CAFETERIA<br>Income Report</h1>
  <!-- Hidden value for shopName used in script -->
  <input type="hidden" id="shopName" value="NETEDC-CAFETERIA">

  <div class="row">
    <div style="flex:1 1 140px; min-width:0">
      <label for="fromDate">From</label>
      <input type="date" id="fromDate" required>
    </div>
    <div style="flex:1 1 140px; min-width:0">
      <label for="toDate">To</label>
      <input type="date" id="toDate" required>
    </div>
  </div>

  <div class="actions">
    <button id="downloadShopPdfBtn" class="btn">Download PDF Report</button>
  </div>

  <div id="messageArea"></div>
</div>

<script>
function showMessage(msg, type) {
  var area = document.getElementById('messageArea');
  area.innerHTML = '<div class="msg ' + (type||'info') + '">' + msg + '</div>';
}

// Optionally set default date range to this month
window.onload = function() {
  var today = new Date();
  var yyyy = today.getFullYear();
  var mm = String(today.getMonth() + 1).padStart(2, '0');
  var dd = String(today.getDate()).padStart(2, '0');
  document.getElementById('fromDate').value = yyyy + '-' + mm + '-01';
  document.getElementById('toDate').value = yyyy + '-' + mm + '-' + dd;
};

document.getElementById('downloadShopPdfBtn').addEventListener('click', function() {
  const shopName = document.getElementById('shopName').value;
  const fromDateStr = document.getElementById('fromDate').value;
  const toDateStr = document.getElementById('toDate').value;

  if (!fromDateStr || !toDateStr) {
    showMessage("Please select both from and to dates.", "error");
    return;
  }
  if (fromDateStr > toDateStr) {
    showMessage("From date cannot be after To date.", "error");
    return;
  }

  showMessage("Generating PDF...", "info");
  google.script.run
    .withSuccessHandler(function(base64) {
      const byteCharacters = atob(base64);
      const byteNumbers = new Array(byteCharacters.length);
      for (let i = 0; i < byteCharacters.length; i++) {
        byteNumbers[i] = byteCharacters.charCodeAt(i);
      }
      const byteArray = new Uint8Array(byteNumbers);
      const blob = new Blob([byteArray], {type: 'application/pdf'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Income_${shopName}_Report_${fromDateStr}_to_${toDateStr}.pdf`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showMessage("PDF generated and downloaded!", "success");
    })
    .withFailureHandler(function(err) {
      showMessage("PDF generation failed: " + (err && err.message ? err.message : err), "error");
    })
    .generateShopPdfReportBase64(shopName, fromDateStr, toDateStr);
});
</script>
</body>
</html>
